version: 2
updates:
  # Python deps in the action image
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
  # The action's own workflow actions (checkout, setup-python, docker login…)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
  # Base image in the Dockerfile. We deliberately target Python 3.12, so ignore
  # major/minor bumps of the python base image (still get digest/patch updates).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
