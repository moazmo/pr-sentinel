# Release flow (D12): tag vX.Y.Z ->
#   1. build + push the image to GHCR (the only way release images are built,
#      so the tag -> source mapping stays auditable)
#   2. rewrite action.yml on the tag to reference the prebuilt image
#      (users pull in seconds instead of building Docker at PR time)
#   3. move the moving major tag (e.g. v2) so `@v2` users get patches free
name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          VERSION="${GITHUB_REF_NAME}"
          MAJOR="${VERSION%%.*}"
          IMAGE="ghcr.io/${{ github.repository }}"
          docker build -t "$IMAGE:$VERSION" -t "$IMAGE:$MAJOR" .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:$MAJOR"

      - name: Point action.yml at the prebuilt image and retag
        run: |
          VERSION="${GITHUB_REF_NAME}"
          MAJOR="${VERSION%%.*}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s|image: \"Dockerfile\"|image: \"docker://ghcr.io/${{ github.repository }}:${VERSION}\"|" action.yml
          git add action.yml
          git commit -m "release: point ${VERSION} at prebuilt GHCR image"
          git tag -f "$VERSION"
          git tag -f "$MAJOR"
          git push -f origin "$VERSION" "$MAJOR"
