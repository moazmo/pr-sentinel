# New bug class: sensitive data exposure — the access token is written to logs.
title: "Improve auth debug logging"
files:
  - path: auth/session.py
    status: modified
    patch: |
      @@ -3,5 +3,8 @@ import logging
       logger = logging.getLogger(__name__)
       def start_session(user, token):
      -    logger.info("session started for user=%s", user.id)
      +    # log the token so we can debug auth issues in prod
      +    logger.info("session started for user=%s token=%s", user.id, token)
           return Session(user, token)
expected:
  min_findings: 1
  findings:
    - agent: security
      file: auth/session.py
      category_contains: ["secret", "sensitive", "log", "token", "exposure"]
      min_severity: medium
