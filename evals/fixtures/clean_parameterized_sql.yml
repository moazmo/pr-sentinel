# Hard negative: looks like SQL string-building, but is correctly parameterized.
# A naive reviewer flags it; a good one must NOT. NO findings expected.
title: "Add filtered user query"
files:
  - path: db/users.py
    status: modified
    patch: |
      @@ -8,6 +8,16 @@ def get_user(conn, user_id):
           return conn.execute("SELECT * FROM users WHERE id = ?", (user_id,)).fetchone()
      +
      +
      +def find_users(conn, name, status, limit=50):
      +    # Dynamic column list is from a fixed allowlist, values are bound params.
      +    clauses = ["name LIKE ?", "status = ?"]
      +    params = [f"%{name}%", status]
      +    sql = "SELECT id, name, status FROM users WHERE " + " AND ".join(clauses)
      +    sql += " LIMIT ?"
      +    params.append(limit)
      +    return conn.execute(sql, params).fetchall()
