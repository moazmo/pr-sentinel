# Misleading-title variant: "docs" title, real command injection in the diff.
title: "docs: clarify the deploy helper's comment"
files:
  - path: tools/deploy.py
    status: modified
    patch: |
      @@ -3,5 +3,9 @@ import subprocess
       def deploy(target):
