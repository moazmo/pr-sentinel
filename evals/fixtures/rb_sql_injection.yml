# New-language coverage (Ruby): SQL injection via string interpolation in a
# where clause.
title: "Add member search to the API"
files:
  - path: app/models/member.rb
    status: modified
    patch: |
      @@ -4,5 +4,9 @@ class Member < ApplicationRecord
         def self.find_by_id(id)
           where(id: id).first
         end
      +
      +  def self.search(name)
      +    where("name = '#{name}'").to_a
      +  end
       end
expected:
  min_findings: 1
  findings:
    - agent: security
      file: app/models/member.rb
      category_contains: ["injection", "sql"]
      min_severity: high
