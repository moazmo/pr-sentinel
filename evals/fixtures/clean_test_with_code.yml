title: "Add percentage helper"
files:
  - path: util/math.py
    status: added
    patch: |
      @@ -0,0 +1,9 @@
      +def percent(part: float, whole: float) -> float:
      +    """Return part/whole as a percentage, 0.0 when whole is zero."""
      +    if whole == 0:
      +        return 0.0
      +    return round(part / whole * 100, 2)
  - path: tests/test_math.py
    status: added
    patch: |
      @@ -0,0 +1,8 @@
