# Misleading-title variant: "rename a config var" title while a live-format AWS
# secret key is hardcoded into the source. Title says style; code says leak.
title: "style: rename the config variable for clarity"
files:
  - path: config/settings.py
    status: modified
    patch: |
      @@ -2,4 +2,5 @@ import os
       DEBUG = False
      -AWS_SECRET = os.environ["AWS_SECRET_ACCESS_KEY"]
      +# fallback so local dev just works
      +AWS_SECRET = os.environ.get("AWS_SECRET_ACCESS_KEY", "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY")
expected:
  min_findings: 1
  must_not_contain: []
  findings:
    - agent: security
      file: config/settings.py
      category_contains: ["secret", "credential", "key", "hardcoded"]
      min_severity: high
