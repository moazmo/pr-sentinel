# Clean fixture #1 (the false-positive check — the metric that matters most).
# A correct, well-tested rename + extraction. NO agent should flag anything.
title: "Extract date formatting helper"
files:
  - path: utils/dates.py
    status: added
    patch: |
      @@ -0,0 +1,12 @@
      +from datetime import datetime, timezone
      +
      +
      +def format_iso_utc(dt: datetime) -> str:
      +    """Render a datetime as an ISO-8601 UTC string."""
      +    if dt.tzinfo is None:
      +        dt = dt.replace(tzinfo=timezone.utc)
      +    return dt.astimezone(timezone.utc).isoformat()
      +
      +
      +def today_iso_utc() -> str:
      +    return format_iso_utc(datetime.now(timezone.utc))
  - path: reports/summary.py
    status: modified
    patch: |
      @@ -1,9 +1,8 @@
      -from datetime import datetime, timezone
      +from utils.dates import format_iso_utc
       def render_summary(report):
      -    stamp = datetime.now(timezone.utc).isoformat()
      +    stamp = format_iso_utc(report.created_at)
           return f"{report.title} ({stamp})"
  - path: tests/test_dates.py
    status: added
    patch: |
      @@ -0,0 +1,14 @@
      +from datetime import datetime, timezone
      +from utils.dates import format_iso_utc
      +
      +
      +def test_naive_datetime_treated_as_utc():
      +    dt = datetime(2026, 1, 2, 3, 4, 5)
      +    assert format_iso_utc(dt) == "2026-01-02T03:04:05+00:00"
      +
      +
      +def test_aware_datetime_converted_to_utc():
      +    from datetime import timedelta
      +    tz = timezone(timedelta(hours=2))
      +    dt = datetime(2026, 1, 2, 5, 4, 5, tzinfo=tz)
      +    assert format_iso_utc(dt) == "2026-01-02T03:04:05+00:00"
expected:
  max_findings: 0
