name: "PR Sentinel Multi-Agent Reviewer"
description: >-
  Five LLM agents review each pull request and post one prioritized comment.
  Runs in your CI, bring your own key.
author: "Moaz Muhammad"

branding:
  icon: "shield"
  color: "blue"

inputs:
  api_key:
    description: >-
      Your LLM provider API key (any OpenAI-compatible provider). Pass a
      repository secret named PR_SENTINEL_API_KEY via the secrets context.
    required: true
  github_token:
    description: "GitHub token used to read the PR and post the review comment."
    required: false
    default: ${{ github.token }}

runs:
  using: "docker"
  image: "docker://ghcr.io/moazmo/pr-sentinel:v1.0.3"
  env:
    INPUT_API_KEY: ${{ inputs.api_key }}
    INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
